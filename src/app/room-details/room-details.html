<div class="room-details-page" *ngIf="room">
  <div class="room-hero">
    <img
      [src]="selectedImage"
      [alt]="room.name"
      onerror="
        this.src = 'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=1400&q=80'
      "
    />
  </div>

  <div class="room-content">
    <div class="room-main">
      <h1>{{ room.name }}</h1>
      <div class="room-meta">
        <div class="meta-item">
          <svg viewBox="0 0 24 24">
            <path
              d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"
            />
          </svg>
          Max {{ room.maximumGuests }} guests
        </div>
        <div
          class="meta-item"
          [class.available]="room.available"
          [class.unavailable]="!room.available"
        >
          <svg viewBox="0 0 24 24">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
            />
          </svg>
          {{ room.available ? 'Available' : 'Unavailable' }}
        </div>
      </div>

      <div class="room-images">
        @for (img of room.images; track img.id) {
          <img
            [src]="img.source"
            [alt]="room.name"
            [class.active]="selectedImage === img.source"
            (click)="selectImage(img.source)"
            onerror="
              this.src = 'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=400&q=80'
            "
            style="cursor: pointer"
          />
        }
      </div>
    </div>

    <div class="room-sidebar">
      <div class="price-card">
        <div class="price">${{ room.pricePerNight }}<span> / night</span></div>
        <button class="btn-book" (click)="goToBooking()" [disabled]="!room.available">
          Book Now
        </button>
      </div>
    </div>
  </div>
</div>
