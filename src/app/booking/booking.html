<div class="booking-page" *ngIf="room">
  <div class="booking-header">
    <h1>Book a Room</h1>
    <p>Fill in the details to complete your booking</p>
  </div>

  <div class="booking-layout">
    <div class="booking-form">
      <h2>Your Details</h2>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="form.customerName" placeholder="John Doe" />
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" [(ngModel)]="form.customerPhone" placeholder="+995 555 00 00 00" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Check In</label>
          <input type="date" [(ngModel)]="form.checkInDate" />
        </div>
        <div class="form-group">
          <label>Check Out</label>
          <input type="date" [(ngModel)]="form.checkOutDate" />
        </div>
      </div>

      <button class="btn-submit" (click)="submitBooking()">Confirm Booking</button>
    </div>

    <div class="booking-summary">
      <h2>Booking Summary</h2>
      <div class="summary-card">
        <img
          [src]="room.images[0]?.source"
          [alt]="room.name"
          onerror="
            this.src = 'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=400&q=80'
          "
        />
        <div class="summary-info">
          <div class="summary-name">{{ room.name }}</div>
          <div class="summary-guests">
            <svg viewBox="0 0 24 24">
              <path
                d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"
              />
            </svg>
            Max {{ room.maximumGuests }} guests
          </div>
          <div class="summary-price-per">${{ room.pricePerNight }} / night</div>
        </div>
        <div class="summary-total">
          <span>Total</span>
          <strong>${{ getTotalPrice() }}</strong>
        </div>
      </div>
    </div>
  </div>
</div>
<app-alert [message]="alertMessage" [type]="alertType" [visible]="alertVisible"></app-alert>
