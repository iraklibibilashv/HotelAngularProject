<div class="rooms-page">
  <div class="rooms-header">
    <h1>Rooms</h1>
  </div>

  <div class="rooms-layout">
    <div class="filters-panel">
      <div class="filter-group">
        <label>Price Range: ${{ filters.priceFrom }} — ${{ filters.priceTo }}</label>
        <div class="range-inputs">
          <input type="range" [(ngModel)]="filters.priceFrom" min="0" max="1000" step="10" />
          <input type="range" [(ngModel)]="filters.priceTo" min="0" max="1000" step="10" />
        </div>
      </div>

      <div class="filter-group">
        <label>Room Type</label>
        <select [(ngModel)]="filters.roomTypeId">
          <option [value]="0">All Types</option>
          @for (type of roomsTypes; track type.id) {
            <option [value]="type.id">{{ type.name }}</option>
          }
        </select>
      </div>

      <div class="filter-group">
        <label>Check In</label>
        <input type="date" [(ngModel)]="filters.checkIn" />
      </div>

      <div class="filter-group">
        <label>Check Out</label>
        <input type="date" [(ngModel)]="filters.checkOut" />
      </div>

      <div class="filter-group">
        <label>Guests</label>
        <input type="number" [(ngModel)]="filters.maximumGuests" placeholder="0" min="0" />
      </div>

      <div class="filter-actions">
        <button class="btn-apply" (click)="applyFilters()">Apply</button>
        <button class="btn-reset" (click)="resetFilters()">Reset</button>
      </div>
    </div>

    <div class="rooms-list">
      @for (room of rooms; track room.id) {
        <div class="room-card" (click)="goToDetails(room.id)" style="cursor: pointer">
          <img
            [src]="room.images[0]?.source"
            [alt]="room.name"
            class="room-img"
            onerror="
              this.src = 'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=600&q=80'
            "
          />
          <div class="room-info">
            <div class="room-name">{{ room.name }}</div>
            <div class="room-meta">
              <span>
                <svg viewBox="0 0 24 24">
                  <path
                    d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"
                  />
                </svg>
                Max {{ room.maximumGuests }} guests
              </span>
              <span class="room-available" [class.unavailable]="!room.available">
                {{ room.available ? 'Available' : 'Unavailable' }}
              </span>
            </div>
            <div class="room-price">${{ room.pricePerNight }}<span> / night</span></div>
          </div>
        </div>
      }
    </div>
  </div>
</div>
